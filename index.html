<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayerVerse</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div id="particles"></div>

<header>
    <nav>
        <div class="logo">
            ⚽ PlayerVerse
        </div>

        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#countries">Countries</a></li>
            <li><a href="#players">Players</a></li>
        </ul>
    </nav>
</header>

<section id="home" class="hero">

    <div class="hero-content">

        <h1>
            THE ULTIMATE
            <span>FOOTBALL</span>
            UNIVERSE
        </h1>

        <p>
            Explore every national team, every player and every football story.
        </p>

        <button id="exploreBtn">
            Explore Nations
        </button>

    </div>

</section>

<section id="countries">

    <h2 class="section-title">
        National Teams
    </h2>

    <div id="countryGrid" class="country-grid">

        <!-- app.js orqali to'ldiriladi -->

    </div>

</section>

<section id="teamSection" class="hidden">

    <div class="team-header">

        <div id="teamFlag" class="team-flag"></div>

        <div>
            <h2 id="teamName"></h2>
            <p id="teamFormation"></p>
        </div>

    </div>

    <div class="search-box">

        <input
            type="text"
            id="playerSearch"
            placeholder="Search player..."
        >

    </div>

    <div id="playersGrid" class="players-grid">

        <!-- Futbolchilar shu yerga chiqadi -->

    </div>

</section>

<section id="playerModal" class="modal hidden">

    <div class="modal-content">

        <span id="closeModal">&times;</span>

        <div class="player-top">

            <img
                id="playerImage"
                src=""
                alt=""
            >

            <div>

                <h2 id="playerName"></h2>

                <p id="playerClub"></p>

                <p id="playerPosition"></p>

                <p id="playerAge"></p>

                <p id="playerHeight"></p>

                <p id="playerCaps"></p>

                <p id="playerGoals"></p>

            </div>

        </div>

        <div class="player-bio">

            <h3>Biography</h3>

            <p id="playerBio"></p>

        </div>

    </div>

</section>

<footer>

    <h3>PlayerVerse</h3>

    <p>
        The Ultimate Football Universe
    </p>

</footer>

<script src="app.js"></script>

</body>
</html>
